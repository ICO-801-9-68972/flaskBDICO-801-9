{% extends "layout.html" %} 
{% block container %}

<div class="py-20 flex justify-center items-center">
  <div class="w-full max-w-sm bg-white border border-gray-200 rounded-lg shadow-md p-6">
    
    <div class="flex justify-end px-4 pt-4">
      <span class="text-gray-500 font-bold text-xl">...</span>
    </div>

    <div class="flex flex-col items-center pb-6">
      
      <div class="w-24 h-24 mb-4 rounded-full bg-gradient-to-tr from-green-400 to-blue-500 flex items-center justify-center text-white shadow-inner">
        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
        </svg>
      </div>
      
      <h5 class="mb-1 text-xl font-bold text-gray-900 text-center uppercase">
        {{ nombre }}
      </h5>
      <span class="text-sm text-gray-500 font-medium mb-6 uppercase">
        {{ apaterno }} {{ amaterno }}
      </span>
      
      <div class="w-full bg-gray-50 rounded-lg p-4 border border-gray-100 shadow-sm">
        <div class="flex justify-between py-2 border-b border-gray-200">
          <span class="font-bold text-gray-700">ID / Matrícula:</span>
          <span class="text-gray-600">{{ id }}</span>
        </div>
        <div class="flex justify-between py-2 border-b border-gray-200">
          <span class="font-bold text-gray-700">Edad:</span>
          <span class="text-gray-600">{{ edad }} años</span>
        </div>
        <div class="flex flex-col py-2">
          <span class="font-bold text-gray-700 mb-1">Correo:</span>
          <span class="text-gray-600 break-words">{{ correo }}</span>
        </div>
      </div>

      <div class="flex mt-8 space-x-3">
        <a href="/alumnos" class="inline-flex items-center px-6 py-2.5 text-sm font-medium text-center text-white bg-green-500 rounded-lg hover:bg-green-600 focus:ring-4 focus:outline-none focus:ring-green-300 gap-2 transition-colors shadow-sm">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          Regresar
        </a>
      </div>

    </div>
  </div>
</div>

{% endblock %}
