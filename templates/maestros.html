{% extends "layout.html" %} {% block container %}

<div class="py-32 relative overflow-x-auto sm:rounded-lg">
  <a
    href="datos_maestros"
    class="bg-green-500 text-white px-4 py-2 rounded flex items-center gap-2 hover:bg-green-600 inline-flex mb-4"
  >
    <svg class="w-6 h-6 text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
      <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12h4m-2 2v-4M4 18v-1a3 3 0 0 1 3-3h4a3 3 0 0 1 3 3v1a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1Zm8-10a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
    </svg>
    Nuevo Maestro
  </a>
  <table class="py-2 w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400">
    <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
      <tr>
        <th scope="col" class="px-6 py-3">Matrícula</th>
        <th scope="col" class="px-6 py-3">Nombre</th>
        <th scope="col" class="px-6 py-3">Apellidos</th>
        <th scope="col" class="px-6 py-3">Especialidad</th>
        <th scope="col" class="px-6 py-3">Correo</th>
        <th scope="col" class="px-6 py-3">Acciones</th>
      </tr>
    </thead>
    <tbody>
      {% for mae in maestro %}
      <tr class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 border-gray-200">
        <th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap dark:text-white">
          {{ mae.matricula }}
        </th>
        <td class="px-6 py-4">{{ mae.nombre }}</td>
        <td class="px-6 py-4">{{ mae.apellidos }}</td>
        <td class="px-6 py-4">{{ mae.especialidad }}</td>
        <td class="px-6 py-4">{{ mae.email }}</td>
        <td class="px-6 py-4 flex gap-2">
            <a href="modificar_maestro?id={{ mae.matricula }}" class="text-white bg-orange-500 hover:bg-orange-600 px-3 py-1 rounded">Editar</a>
            <a href="eliminar_maestro?id={{ mae.matricula }}" class="text-white bg-red-500 hover:bg-red-600 px-3 py-1 rounded">Eliminar</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
